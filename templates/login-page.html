<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-page.css') }}">
</head>
<body>
    <div class="bg_img">
        <div class="blank"></div>
        <img class="bg-img" src="{{ url_for('static', filename='images/classic-navy-suit.jpg') }}" alt="">
        <img class="bg-img2" src="{{ url_for('static', filename='images/pink-gown-alt.webp') }}" alt="">
    </div>
    <div class="formbody">   

        <div class="signup">
            <form action="" id="loginform">
            <h1 id="header">LOGIN</h1>
            
            <input type="text" id="username" placeholder="Username..." required>
        
            <br><br>
             
            
            <input type="password" id="password" placeholder="password..." required>
            <br><br>
    
            <button id="btnform" style="background-color: greenyellow;" type="submit">Login</button>
             
            <br>
             <span style="color: azure;">If you don't have an account <a style="color:rgb(159, 17, 17);" href="{{ url_for('signup_page') }}">Sign up</a></span>
            </form>
        
        </div>
        
        </div>

        <div class="successful_hide">
            <h3>Login Successful</h3>
        </div>
    
        <h3 class="validate_hide">Credentials Not Found</h3>
        
       
        <script src="{{ url_for('static', filename='js/login-page.js') }}"></script>
</body>
</html>

{% extends 'base.html' %}

{% block title %}Shop Our Collection{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product-catalog.css') }}">
{% endblock %}

{% block content %}
    <div class="container">
        <!-- Catalog Header -->
        <div class="catalog-header">
            <div class="catalog-header__container">
                <h1 class="catalog-header__title" id="currentCategoryTitle">All Collection</h1>
                <span class="catalog-header__count" id="productCountText">26 Items</span>
            </div>
        </div>

        <!-- Products Toolbar -->
        <div class="products__toolbar">
            <div class="toolbar__filters">
                <button class="filter-btn" onclick="ToggleFilterMenu()">
                    Filter <iconify-icon icon="lucide:chevron-down"></iconify-icon>
                </button>
                <div class="toolbar__category-pills" id="categoryPillList">
                    <!-- Categories will be rendered here -->
                </div>
            </div>
            
            <div class="toolbar__sort">
                <select id="sortSelect" onchange="HandleSort(this.value)" class="filter-btn" style="border:none; background:none; text-transform: uppercase;">
                    <option value="featured">Sort by: Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="products__grid" id="productGrid">
            <!-- Products will be dynamically rendered here -->
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{{ url_for('static', filename='js/product-catalog.js') }}"></script>
{% endblock %}

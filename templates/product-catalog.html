<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mackkas | Shop Our Collection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product-catalog.css') }}">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav__content">
                <ul class="nav__menu">
                    <li><a href="{{ url_for('product_catalog') }}" class="nav_link">Shop</a></li>
                    <li><a href="{{ url_for('product_catalog') }}" class="nav_link">New in</a></li>
                    <li><a href="{{ url_for('index') }}#about" class="nav_link">About</a></li>
                </ul>

                <a href="/" class="nav__logo">Mackkas</a>

                <div class="nav__actions">
                    <button class="nav__icon" aria-label="Search">
                        <iconify-icon icon="lucide:search"></iconify-icon>
                    </button>
                    <a href="{{ url_for('login_page') }}" class="nav__icon" aria-label="Account">
                        <iconify-icon icon="lucide:user"></iconify-icon>
                    </a>
                    <button class="nav__icon nav__cart" id="openCartBtn" aria-label="Cart">
                        <iconify-icon icon="lucide:shopping-bag"></iconify-icon>
                        <span class="badge" id="cartCountBadge">0</span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Catalog Header -->
        <div class="catalog-header">
            <div class="catalog-header__container">
                <h1 class="catalog-header__title" id="currentCategoryTitle">All Collection</h1>
                <span class="catalog-header__count" id="productCountText">26 Items</span>
            </div>
        </div>

        <!-- Products Toolbar -->
        <div class="products__toolbar">
            <div class="toolbar__filters">
                <button class="filter-btn" onclick="ToggleFilterMenu()">
                    Filter <iconify-icon icon="lucide:chevron-down"></iconify-icon>
                </button>
                <div class="toolbar__category-pills" id="categoryPillList">
                    <!-- Categories will be rendered here -->
                </div>
            </div>
            
            <div class="toolbar__sort">
                <select id="sortSelect" onchange="HandleSort(this.value)" class="filter-btn" style="border:none; background:none; text-transform: uppercase;">
                    <option value="featured">Sort by: Featured</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="products__grid" id="productGrid">
            <!-- Products will be dynamically rendered here -->
        </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart_blocker_hide" id="cartOverlay"></div>
    <aside class="cart-drawer close_cart" id="cartDrawer">
        <div class="cart-drawer__header">
            <h2 class="cart-drawer__title">Shopping Bag</h2>
            <button class="close-cart-btn" id="closeCartBtn">
                <iconify-icon icon="lucide:x"></iconify-icon>
            </button>
        </div>

        <div class="cart-items" id="cartItemsContainer">
            <!-- Cart items will be rendered here -->
        </div>

        <div class="cart-drawer__footer">
            <div class="cart-summary__row">
                <span>Subtotal</span>
                <span id="cartSubtotal">$0.00</span>
            </div>
            <p style="font-size: 10px; color: var(--color-neutral-500); margin-bottom: 20px;">Shipping and taxes calculated at checkout</p>
            
            <button class="button button--primary w-full" style="margin-bottom: 15px;">Proceed to Checkout</button>
            <button class="button button--outline w-full" id="continueShoppingBtn">Continue Shopping</button>
        </div>
    </aside>

    <script src="{{ url_for('static', filename='js/product-catalog.js') }}"></script>
</body>
</html>

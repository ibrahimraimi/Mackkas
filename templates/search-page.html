{% extends 'base.html' %}

{% block title %}Search{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product-catalog.css') }}">
    <style>
        .search-header {
            padding: var(--spacing-24) 0 var(--spacing-12);
            text-align: center;
        }
        .search-input-wrapper {
            max-width: 600px;
            margin: 0 auto var(--spacing-12);
            position: relative;
            border-bottom: 2px solid var(--color-black);
        }
        .search-input {
            width: 100%;
            padding: 16px 0;
            border: none;
            background: transparent;
            font-family: var(--font-serif);
            font-size: var(--text-3xl);
            outline: none;
            text-align: center;
        }
        .search-input::placeholder {
            color: var(--color-neutral-200);
        }
        .search-stats {
            font-size: var(--text-xs);
            color: var(--color-neutral-500);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: var(--spacing-16);
        }
    </style>
{% endblock %}

{% block content %}
    <div class="container">
        <div class="search-header">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="What are you looking for?" autofocus>
            </div>
            <div class="search-stats" id="searchStats">Type to start searching</div>
        </div>

        <div class="products__grid" id="searchResultsGrid">
            <!-- Search results will appear here -->
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{{ url_for('static', filename='js/search-page.js') }}"></script>
{% endblock %}
